<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta name="viewport" id="viewport" content="width=device-width, initial-scale=1.0">
<meta name="MobileOptimized" content="320">
<meta name="HandheldFriendly" content="true">
<meta http-equiv="content-language" content="en">
<meta http-equiv="cleartype" content="on">

<meta property="og:url" content="">
<meta property="og:type" content="website">
<meta property="og:title" content="MEMEchelin - Stake">
<meta property="og:description" content="">
<meta property="og:image" content="">

<link rel="stylesheet" type="text/css" href="css/fonts.css">

<link rel="apple-touch-icon" sizes="144x144" href="img/fav.png">
<link rel="shortcut icon" type="image/png" sizes="32x32" href="img/fav.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/fav.png">
<link rel="mask-icon" href="img/fav.png" color="#FF029C">

<script src="js/jquery-3.2.1.min.js" type="text/javascript"></script>

<title>MEMEchelin - Stake</title>

<style type="text/css">
    :root {
        --yellow: #FEDB02;
        --pink: #FF029C;
        --yellowHover: #FFE85A;
        --pinkHover: #FF4EBA;
        --background: #090408;
        --card-background: #180010;
    }

    html,
    body {
        margin: 0px;
        padding: 0px;
        overflow-x: hidden;
        cursor: default;
        overscroll-behavior-x: none;
    }

    body {
        --default: url('img/cursor.webp'), auto;
        --pointer: url('img/cursor-hover.webp?1'), pointer;

        background-color: var(--background);
        color: #fff;
        font-family: 'Montserrat';
        font-weight: 400;
        font-size: 18px;
        letter-spacing: 0px;
        min-height: 100vh;
    }

    /* Header */
    .header-fixed-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
    }

    .header-fixed {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 32px;
        background: linear-gradient(180deg, rgba(9,4,8,0.95) 0%, rgba(9,4,8,0) 100%);
    }

    .header-fixed.hidden {
        opacity: 0;
        pointer-events: none;
    }

    .logo {
        width: 50px;
        height: 50px;
        background: url('img/fav.png') center/contain no-repeat;
        cursor: pointer;
    }

    .socials {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .social {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        cursor: var(--pointer);
        transition: background 0.2s;
    }

    .social:hover {
        background: rgba(255,255,255,0.2);
    }

    .social.twitter {
        background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23fff"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>') center/60% no-repeat rgba(255,255,255,0.1);
    }

    .social.fourmeme {
        background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23fff"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>') center/60% no-repeat rgba(255,255,255,0.1);
    }

    .language-toggle {
        background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23fff"><circle cx="12" cy="12" r="10" stroke="%23fff" stroke-width="2" fill="none"/><path d="M2 12h20M12 2c-3 3-3 17 0 20M12 2c3 3 3 17 0 20" stroke="%23fff" stroke-width="2"/></svg>') center/60% no-repeat rgba(255,255,255,0.1);
    }

    .social.wallet-connect {
        background: rgba(255,255,255,0.1);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .social.wallet-connect:hover {
        background: rgba(255,255,255,0.2);
    }

    .social.wallet-connect.connected {
        background: var(--yellow);
    }

    .wallet-popup {
        position: fixed;
        top: 70px;
        right: 20px;
        background: var(--card-background);
        border: 1px solid rgba(254, 219, 2, 0.4);
        border-radius: 12px;
        padding: 16px;
        min-width: 260px;
        z-index: 1001;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        display: none;
    }

    .wallet-popup.show {
        display: block;
    }

    .wallet-popup-header {
        font-size: 12px;
        color: rgba(255,255,255,0.6);
        margin-bottom: 8px;
        text-transform: uppercase;
    }

    .wallet-popup-address {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        word-break: break-all;
        margin-bottom: 12px;
        text-decoration: none;
        cursor: pointer;
    }

    .wallet-popup-address:hover {
        color: var(--yellow);
        text-decoration: underline;
    }

    .wallet-popup-disconnect {
        width: 100%;
        height: 40px;
        background: var(--pink);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        font-family: 'Montserrat';
    }

    .wallet-popup-disconnect:hover {
        background: var(--pinkHover);
    }

    /* Wallet Selection Modal */
    .wallet-select-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
    }

    .wallet-select-modal.show {
        display: flex;
    }

    .wallet-select-content {
        background: var(--card-background);
        border: 1px solid rgba(254, 219, 2, 0.4);
        border-radius: 20px;
        padding: 24px;
        width: 90%;
        max-width: 360px;
    }

    .wallet-select-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .wallet-select-title {
        font-size: 18px;
        font-weight: 700;
        color: #fff;
    }

    .wallet-select-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.5);
        font-size: 24px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
    }

    .wallet-select-close:hover {
        color: #fff;
    }

    .wallet-option {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px;
        background: rgba(255,255,255,0.05);
        border: 2px solid rgba(254, 219, 2, 0.2);
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 12px;
    }

    .wallet-option:hover {
        background: rgba(255,255,255,0.1);
        border-color: var(--yellow);
    }

    .wallet-option:last-child {
        margin-bottom: 0;
    }

    .wallet-option.disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .wallet-option-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
    }

    .wallet-option-icon svg {
        width: 24px;
        height: 24px;
    }

    .wallet-option-info {
        flex: 1;
    }

    .wallet-option-name {
        font-size: 16px;
        font-weight: 700;
        color: #fff;
    }

    .wallet-option-status {
        font-size: 12px;
        color: rgba(255,255,255,0.6);
    }

    .toast-container {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2000;
        display: none;
    }

    .toast-container.show {
        display: block;
    }

    .toast {
        background: var(--card-background);
        border: 2px solid var(--pink);
        border-radius: 12px;
        padding: 16px 20px;
        min-width: 300px;
        max-width: 90vw;
        box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        text-align: center;
    }

    .toast.success {
        border-color: var(--yellow);
    }

    .toast-icon {
        font-size: 32px;
        margin-bottom: 8px;
    }

    .toast.success .toast-icon {
        color: var(--yellow);
    }

    .toast.error .toast-icon {
        color: var(--pink);
    }

    .toast-title {
        font-size: 16px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 8px;
    }

    .toast-message {
        font-size: 14px;
        color: rgba(255,255,255,0.7);
        margin-bottom: 12px;
        word-break: break-word;
    }

    .toast-link {
        display: inline-block;
        font-size: 13px;
        color: var(--yellow);
        text-decoration: underline;
        cursor: pointer;
    }

    .toast-close {
        position: absolute;
        top: 8px;
        right: 12px;
        background: none;
        border: none;
        color: rgba(255,255,255,0.5);
        font-size: 20px;
        cursor: pointer;
    }

    .toast-close:hover {
        color: #fff;
    }

    .toast-progress {
        height: 3px;
        background: var(--yellow);
        border-radius: 0 0 10px 10px;
        margin-top: 12px;
        animation: toastProgress 3s linear forwards;
    }

    .toast.error .toast-progress {
        background: var(--pink);
    }

    @keyframes toastProgress {
        from { width: 100%; }
        to { width: 0%; }
    }

    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 1000;
        display: none;
    }

    .overlay.show {
        display: block;
    }

    .deposit-button {
        height: 44px;
        padding: 0 24px;
        background: linear-gradient(110deg, var(--yellow) 0%, #fff7a8 50%, var(--yellow) 100%);
        background-size: 200% 100%;
        border-radius: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: var(--pointer);
        transition: all 0.3s ease;
        border: none;
    }

    .deposit-button span {
        font-weight: 900;
        font-size: 14px;
        color: #000;
        letter-spacing: 1px;
    }

    .deposit-button:hover {
        background-position: 100% 100%;
        box-shadow: 0 0 30px rgba(254, 219, 2, 0.5);
    }

    /* Main Content */
    .stake-page {
        min-height: 100vh;
        padding: 120px 20px 60px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .stake-container {
        width: 100%;
        max-width: 480px;
    }

    .stake-card {
        background: var(--card-background);
        border: 1px solid rgba(254, 219, 2, 0.4);
        border-radius: 20px;
        box-shadow: 0 0 60px rgba(255, 2, 156, 0.25), 0 0 40px rgba(254, 219, 2, 0.15);
        padding: 28px 24px 32px;
    }

    .stake-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
    }

    .stake-header-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .stake-back {
        width: 40px;
        height: 40px;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 20px;
        border-radius: 10px;
        cursor: var(--pointer);
        transition: background 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .stake-back:hover {
        background: rgba(255, 255, 255, 0.2);
    }

    .stake-title {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 900;
        font-size: 26px;
        color: #fff;
    }

    .stake-title-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--yellow), var(--pink));
        border-radius: 10px;
    }

    .stake-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 24px;
    }

    .stake-stat {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(254, 219, 2, 0.2);
        border-radius: 14px;
        padding: 16px;
    }

    .stake-stat-label {
        font-family: 'Graphik';
        font-size: 12px;
        font-weight: 600;
        color: var(--yellow);
        text-transform: uppercase;
        margin-bottom: 6px;
    }

    .stake-stat-value {
        font-weight: 900;
        font-size: 22px;
        color: #fff;
    }

    .stake-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
    }

    .stake-tab {
        flex: 1;
        height: 52px;
        border: 2px solid rgba(254, 219, 2, 0.4);
        background: transparent;
        color: rgba(255, 255, 255, 0.7);
        font-weight: 800;
        font-size: 16px;
        border-radius: 12px;
        cursor: var(--pointer);
        transition: all 0.25s ease;
        font-family: 'Montserrat';
    }

    .stake-tab.active {
        background: linear-gradient(110deg, var(--yellow) 0%, var(--yellow) 30%, #fff7a8 50%, var(--yellow) 70%, var(--yellow) 100%);
        background-size: 260% 100%;
        border-color: var(--yellow);
        color: #000;
        animation: depositButtonGlow 2.6s ease-in-out infinite;
    }

    .stake-form {
        position: relative;
    }

    .stake-form-tab {
        display: none;
    }

    .stake-form-tab.active {
        display: block;
    }

    .stake-input-wrapper {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.08);
        border: 2px solid rgba(254, 219, 2, 0.3);
        border-radius: 14px;
        overflow: hidden;
        transition: border-color 0.25s ease;
    }

    .stake-input-wrapper:focus-within {
        border-color: var(--yellow);
    }

    .stake-input {
        flex: 1;
        height: 60px;
        padding: 0 20px;
        background: transparent;
        border: none;
        color: #fff;
        font-size: 20px;
        font-weight: 600;
        outline: none;
        width: 100%;
        font-family: 'Montserrat';
    }

    .stake-input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }

    .stake-max-btn {
        height: 40px;
        padding: 0 16px;
        margin-right: 10px;
        background: var(--yellow);
        border: none;
        border-radius: 8px;
        color: #000;
        font-weight: 800;
        font-size: 13px;
        cursor: var(--pointer);
        transition: background 0.2s;
        font-family: 'Montserrat';
    }

    .stake-max-btn:hover {
        background: var(--yellowHover);
    }

    .stake-balance {
        display: flex;
        justify-content: space-between;
        padding: 12px 4px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
    }

    .stake-balance span:last-child {
        font-weight: 700;
        color: #fff;
    }

    .stake-submit-wrapper {
        margin-top: 16px;
    }

    .stake-submit {
        width: 100%;
        height: 58px;
        background: linear-gradient(110deg, var(--pink) 0%, #ff4eb8 50%, var(--pink) 100%);
        background-size: 260% 100%;
        border: none;
        border-radius: 14px;
        color: #fff;
        font-weight: 900;
        font-size: 18px;
        cursor: var(--pointer);
        transition: all 0.25s ease;
        animation: depositButtonGlow 2.6s ease-in-out infinite;
        font-family: 'Montserrat';
    }

    .stake-submit:hover:not(:disabled) {
        background-position: 50% 50%;
        box-shadow: 0 0 30px rgba(255, 2, 156, 0.5);
    }

    .stake-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .stake-hint {
        margin-top: 16px;
        padding: 12px;
        text-align: center;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
    }

    .withdrawal-status {
        margin-top: 16px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(254, 219, 2, 0.3);
        border-radius: 12px;
    }

    .withdrawal-info {
        margin-bottom: 12px;
    }

    .withdrawal-label {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        text-transform: uppercase;
        margin-bottom: 4px;
    }

    .withdrawal-amount {
        font-size: 18px;
        font-weight: 700;
        color: #fff;
    }

    .withdrawal-timer {
        font-size: 14px;
        color: var(--yellow);
        margin-top: 4px;
    }

    .stake-submit-claim-withdrawal {
        background: linear-gradient(110deg, var(--yellow) 0%, #fff7a8 50%, var(--yellow) 100%);
        background-size: 260% 100%;
        color: #000;
    }

    .stake-submit-claim-withdrawal:hover:not(:disabled) {
        background-position: 50% 50%;
        box-shadow: 0 0 30px rgba(254, 219, 2, 0.5);
    }

    .withdrawal-requests {
        margin-top: 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(254, 219, 2, 0.3);
        border-radius: 12px;
        padding: 16px;
    }

    .withdrawal-requests-header {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 12px;
    }

    .withdrawal-request-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        margin-bottom: 8px;
    }

    .withdrawal-request-item:last-child {
        margin-bottom: 0;
    }

    .withdrawal-request-info {
        flex: 1;
    }

    .withdrawal-request-amount {
        font-size: 16px;
        font-weight: 700;
        color: #fff;
    }

    .withdrawal-request-time {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 4px;
    }

    .withdrawal-request-timer {
        font-size: 12px;
        color: var(--yellow);
        margin-top: 2px;
    }

    .withdrawal-request-timer.ready {
        color: #00ff00;
    }

    .withdrawal-claim-btn {
        height: 36px;
        padding: 0 16px;
        background: var(--yellow);
        border: none;
        border-radius: 8px;
        color: #000;
        font-weight: 800;
        font-size: 13px;
        cursor: pointer;
        font-family: 'Montserrat';
    }

    .withdrawal-claim-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    @keyframes depositButtonGlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @media (max-width: 600px) {
        .stake-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
        }

        .stake-header-left {
            width: 100%;
            justify-content: space-between;
        }

        .stake-title {
            font-size: 22px;
        }

        .stake-stats {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
<body>

<div class="header-fixed-wrapper">
    <div class="header-fixed">
        <a href="/" class="logo"></a>

        <div class="socials">
            <div class="social wallet-connect" id="wallet-connect-btn" aria-label="Connect Wallet">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                    <path d="M21 7.28V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2.28A2 2 0 0 0 22 15V9.14A2 2 0 0 0 21 7.28zM5 5h14v3.17l-2-1.43V5zm14 14H5v-5.74l2 1.43V19zm0-7H7l-2-1.43V9h12v3z"/>
                </svg>
            </div>
            <div class="social twitter" data-href="https://x.com/MEMECHELIN1"></div>
            <div class="social fourmeme" data-href="https://four.meme/"></div>
            <div class="language-toggle social" data-language-toggle aria-label="切换到中文"></div>
        </div>
    </div>
</div>

<div class="overlay" id="wallet-overlay"></div>

<div class="wallet-popup" id="wallet-popup">
    <button class="wallet-popup-close" id="wallet-popup-close" style="position:absolute;top:8px;right:12px;background:none;border:none;color:rgba(255,255,255,0.5);font-size:20px;cursor:pointer;">&times;</button>
    <div class="wallet-popup-header">Connected Wallet</div>
    <a class="wallet-popup-address" id="wallet-popup-address" target="_blank" rel="noopener noreferrer"></a>
    <button class="wallet-popup-disconnect" id="wallet-disconnect-btn">Disconnect</button>
</div>

<div class="wallet-select-modal" id="wallet-select-modal">
    <div class="wallet-select-content">
        <div class="wallet-select-header">
            <span class="wallet-select-title">Connect Wallet</span>
            <button class="wallet-select-close" id="wallet-select-close">&times;</button>
        </div>
        <div class="wallet-option" id="wallet-option-metamask">
            <div class="wallet-option-icon">
                <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <path d="M32.9588 6.82242L21.2769 16.3399L23.8841 10.3156L32.9588 6.82242Z" fill="#E17726"/>
                    <path d="M7.04053 6.82242L18.6765 16.3889L16.1152 10.3156L7.04053 6.82242Z" fill="#E27625"/>

<script src="dist/bundle.js" type="text/javascript"></script>
<script>
(function() {
    var activeTab = 'deposit';
    var refreshInterval = null;
    var StakingApp = window.StakingApp || {};
    var popupVisible = false;
    var walletSelectModalVisible = false;

    var withdrawInterval = null;
    var stakeHint = document.querySelector('.stake-hint');
    var depositForm = document.querySelector('[data-form="deposit"]');
    var withdrawForm = document.querySelector('[data-form="withdraw"]');
    var userDisconnected = localStorage.getItem('walletDisconnected') === 'true'; // Track if user explicitly disconnected

    function init() {
        if (typeof document === 'undefined') return;
        document.addEventListener('DOMContentLoaded', function() {
            bindEvents();
            applyTranslations();
            initWeb3();
        });
    }

    function toggleWalletPopup() {
        var popup = document.getElementById('wallet-popup');
        var overlay = document.getElementById('wallet-overlay');
        if (!popup || !overlay) return;

        popupVisible = !popupVisible;
        popup.classList.toggle('show', popupVisible);
        overlay.classList.toggle('show', popupVisible);
    }

    function hideWalletPopup() {
        var popup = document.getElementById('wallet-popup');
        var overlay = document.getElementById('wallet-overlay');
        if (!popup || !overlay) return;
        popupVisible = false;
        popup.classList.remove('show');
        overlay.classList.remove('show');
    }

    function updateWalletPopup(address) {
        var popup = document.getElementById('wallet-popup');
        var addressEl = document.getElementById('wallet-popup-address');
        if (!popup || !addressEl) return;
        addressEl.textContent = address || '';
        addressEl.href = 'https://testnet.bscscan.com/address/' + address;
    }

    function showWalletSelectModal() {
        var modal = document.getElementById('wallet-select-modal');
        if (!modal) return;
        walletSelectModalVisible = true;
        modal.classList.add('show');
        updateWalletOptions();
    }

    function hideWalletSelectModal() {
        var modal = document.getElementById('wallet-select-modal');
        if (!modal) return;
        walletSelectModalVisible = false;
        modal.classList.remove('show');
    }

    function updateWalletOptions() {
        var wallets = StakingApp.getAvailableWallets ? StakingApp.getAvailableWallets() : [];
        wallets.forEach(function(wallet) {
            var option = document.getElementById('wallet-option-' + wallet.id);
            if (!option) return;
            var statusEl = option.querySelector('.wallet-option-status');
            if (statusEl) {
                if (wallet.id === 'walletconnect') {
                    statusEl.textContent = 'Scan with any wallet';
                } else {
                    statusEl.textContent = wallet.installed ? 'Installed' : 'Not installed';
                }
            }
            if (!wallet.installed && wallet.id !== 'walletconnect') {
                option.classList.add('disabled');
            } else {
                option.classList.remove('disabled');
            }
        });
    }

    async function connectWithWallet(walletId) {
        hideWalletSelectModal();
        var walletBtn = document.getElementById('wallet-connect-btn');
        if (!walletBtn) return;

        try {
            var result = await StakingApp.connectWallet(walletId);
            if (result.success) {
                walletBtn.classList.add('connected');
                updateWalletPopup(result.address);
                setHint('');
                userDisconnected = false;
                localStorage.setItem('walletDisconnected', 'false');
                await loadStakingData();
                startAutoRefresh();
            } else {
                setHint(result.error || 'Failed to connect wallet');
            }
        } catch (err) {
            console.error('Wallet connect error:', err);
            setHint('Failed to connect wallet');
        }
    }

    async function handleDisconnect() {
        hideWalletPopup();
        if (StakingApp.disconnectWallet) {
            await StakingApp.disconnectWallet();
        }
        var walletBtn = document.getElementById('wallet-connect-btn');
        if (walletBtn) walletBtn.classList.remove('connected');
        userDisconnected = true; // Mark as explicitly disconnected
        localStorage.setItem('walletDisconnected', 'true'); // Persist across page refreshes
        loadDemoData();
        setHint('Wallet disconnected');
    }

    function bindEvents() {
        var tabs = document.querySelectorAll('.stake-tab');
        tabs.forEach(function(tab) {
            tab.addEventListener('click', function() {
                switchTab(this.getAttribute('data-tab'));
            });
        });

        var depositSubmit = document.querySelector('.stake-submit-deposit');
        if (depositSubmit) {
            depositSubmit.addEventListener('click', handleDeposit);
        }

        var withdrawSubmit = document.querySelector('.stake-submit-withdraw');
        if (withdrawSubmit) {
            withdrawSubmit.addEventListener('click', handleWithdraw);
        }

        var maxDepositBtn = document.querySelector('[data-staking-max-deposit]');
        if (maxDepositBtn) {
            maxDepositBtn.addEventListener('click', function() {
                var balance = document.querySelector('[data-staking-balance-deposit]');
                if (balance) {
                    var input = document.querySelector('[data-staking-input-deposit]');
                    if (input) input.value = balance.textContent || '0';
                }
            });
        }

        var maxWithdrawBtn = document.querySelector('[data-staking-max-withdraw]');
        if (maxWithdrawBtn) {
            maxWithdrawBtn.addEventListener('click', function() {
                var balance = document.querySelector('[data-staking-balance-withdraw]');
                if (balance) {
                    var input = document.querySelector('[data-staking-input-withdraw]');
                    if (input) input.value = balance.textContent || '0';
                }
            });
        }

        var claimWithdrawalBtn = document.getElementById('claim-withdrawal-btn');
        if (claimWithdrawalBtn) {
            claimWithdrawalBtn.addEventListener('click', handleClaimWithdrawal);
        }

        var walletBtn = document.getElementById('wallet-connect-btn');
        if (walletBtn) {
            walletBtn.addEventListener('click', function() {
                if (StakingApp.isWalletConnected && StakingApp.isWalletConnected()) {
                    toggleWalletPopup();
                } else {
                    showWalletSelectModal();
                }
            });
        }

        // Wallet selection modal handlers
        var walletSelectClose = document.getElementById('wallet-select-close');
        if (walletSelectClose) {
            walletSelectClose.addEventListener('click', hideWalletSelectModal);
        }

        var metamaskOption = document.getElementById('wallet-option-metamask');
        if (metamaskOption) {
            metamaskOption.addEventListener('click', function() {
                if (!this.classList.contains('disabled')) {
                    connectWithWallet('metamask');
                }
            });
        }

        var okxOption = document.getElementById('wallet-option-okxwallet');
        if (okxOption) {
            okxOption.addEventListener('click', function() {
                if (!this.classList.contains('disabled')) {
                    connectWithWallet('okxwallet');
                }
            });
        }

        var wcOption = document.getElementById('wallet-option-walletconnect');
        if (wcOption) {
            wcOption.addEventListener('click', function() {
                connectWithWallet('walletconnect');
            });
        }

        var overlay = document.getElementById('wallet-overlay');
        if (overlay) {
            overlay.addEventListener('click', hideWalletPopup);
        }

        var disconnectBtn = document.getElementById('wallet-disconnect-btn');
        if (disconnectBtn) {
            disconnectBtn.addEventListener('click', handleDisconnect);
        }

        var closeBtn = document.getElementById('wallet-popup-close');
        if (closeBtn) {
            closeBtn.addEventListener('click', hideWalletPopup);
        }
    }

    async function handleWalletConnect() {
        var walletBtn = document.getElementById('wallet-connect-btn');
        if (!walletBtn) return;

        if (StakingApp.isWalletConnected && StakingApp.isWalletConnected()) {
            setHint('Wallet already connected');
            return;
        }

        try {
            var result = await StakingApp.connectWallet();
            if (result.success) {
                walletBtn.classList.add('connected');
                updateWalletPopup(result.address);
                setHint('');
                userDisconnected = false; // Reset disconnected flag on successful connect
                localStorage.setItem('walletDisconnected', 'false'); // Clear persisted disconnected state
                await loadStakingData();
                startAutoRefresh();
            } else {
                setHint(result.error || 'Failed to connect wallet');
            }
        } catch (err) {
            console.error('Wallet connect error:', err);
            setHint('Failed to connect wallet');
        }
    }

    function applyTranslations() {
        if (typeof window === 'undefined' || !window.MEMEchelinI18n) return;
        var lang = document.documentElement.getAttribute('lang') === 'zh-CN' ? 'zh' : 'en';
        var copy = window.MEMEchelinI18n.getTranslations(lang);

        var nodes = document.querySelectorAll('[data-i18n]');
        nodes.forEach(function(node) {
            var key = node.getAttribute('data-i18n');
            if (copy[key] !== undefined) {
                node.textContent = copy[key];
            }
        });
    }

    function switchTab(tab) {
        activeTab = tab;
        var tabs = document.querySelectorAll('.stake-tab');
        tabs.forEach(function(t) {
            t.classList.toggle('active', t.getAttribute('data-tab') === tab);
        });

        var forms = document.querySelectorAll('.stake-form-tab');
        forms.forEach(function(f) {
            f.classList.toggle('active', f.getAttribute('data-form') === tab);
        });
    }

    async function initWeb3() {
        if (typeof window === 'undefined') return;

        // Always try to load global staking data (TVL, APY) even without wallet
        await loadStakingDataPublic();

        // Don't auto-connect if user explicitly disconnected
        if (userDisconnected) {
            return;
        }

        var win = window;
        if (typeof win.ethereum !== 'undefined') {
            try {
                var result = await StakingApp.connectWallet();
                if (result.success) {
                    updateWalletPopup(result.address);
                    await loadStakingData();
                    startAutoRefresh();
                    setHint('');
                }
            } catch (err) {
                console.warn('Wallet not connected:', err);
            }
        }
    }

    async function loadStakingData() {
        try {
            if (!StakingApp.isWalletConnected || !StakingApp.isWalletConnected()) {
                loadDemoData();
                return;
            }

            var info = await StakingApp.getStakeInfo(0);

            updateStat('data-staking-tvl', info.tvl);
            updateStat('data-staking-apy', info.apy);
            updateStat('data-staking-your', info.yourStake);
            updateStat('data-staking-pending', info.pendingReward);

            var depositBalance = document.querySelector('[data-staking-balance-deposit]');
            if (depositBalance) depositBalance.textContent = info.tokenBalance;

            var withdrawBalance = document.querySelector('[data-staking-balance-withdraw]');
            if (withdrawBalance) withdrawBalance.textContent = info.yourStake;

            setHint('');
        } catch (err) {
            console.error('Error loading staking data:', err);
            loadDemoData(); // Clear old data on error
            var errorMsg = 'Error loading data';
            if (err && err.message) {
                errorMsg = err.message.substring(0, 50);
            }
            setHint(errorMsg);
        }
    }

    // Load public data (TVL, APY) without wallet connection
    async function loadStakingDataPublic() {
        try {
            var info = await StakingApp.getStakeInfoPublic(0);
            updateStat('data-staking-tvl', info.tvl);
            updateStat('data-staking-apy', info.apy);
            setHint('');
        } catch (err) {
            console.warn('Error loading public staking data:', err);
            // Keep demo data on error
        }
    }

    function loadDemoData() {
        updateStat('data-staking-tvl', '$0');
        updateStat('data-staking-apy', '0%');
        updateStat('data-staking-your', '$0');
        updateStat('data-staking-pending', '$0');

        var depositBalance = document.querySelector('[data-staking-balance-deposit]');
        if (depositBalance) depositBalance.textContent = '0';

        var withdrawBalance = document.querySelector('[data-staking-balance-withdraw]');
        if (withdrawBalance) withdrawBalance.textContent = '0';

        setHint('Demo mode - contract not configured');
    }

    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(loadStakingData, 10000);
        startWithdrawalStatusUpdate();
    }

    function updateStat(attr, value) {
        var el = document.querySelector('[' + attr + ']');
        if (el) el.textContent = value;
    }

    function setHint(text) {
        if (stakeHint) stakeHint.textContent = text;
    }

    var toastTimeout = null;

    function showToast(success, title, message, txHash) {
        var container = document.getElementById('toast-container');
        var toast = document.getElementById('toast');
        var icon = document.getElementById('toast-icon');
        var titleEl = document.getElementById('toast-title');
        var msgEl = document.getElementById('toast-message');
        var link = document.getElementById('toast-link');
        var progress = document.getElementById('toast-progress');

        if (!container || !toast) return;

        // Clear existing timeout
        if (toastTimeout) {
            clearTimeout(toastTimeout);
            toastTimeout = null;
        }

        // Reset animation
        progress.style.animation = 'none';
        progress.offsetHeight; // Trigger reflow
        progress.style.animation = '';

        toast.className = 'toast ' + (success ? 'success' : 'error');
        icon.textContent = success ? '\u2713' : '\u2717';
        titleEl.textContent = title || (success ? 'Success' : 'Error');
        msgEl.textContent = message || '';

        if (txHash && success) {
            var bscUrl = 'https://testnet.bscscan.com/tx/' + txHash;
            link.href = bscUrl;
            link.textContent = 'View on BscScan \u2197';
            link.style.display = 'inline-block';
        } else {
            link.style.display = 'none';
        }

        container.classList.add('show');

        toastTimeout = setTimeout(function() {
            container.classList.remove('show');
        }, 4000);
    }

    async function handleDeposit() {
        var input = document.querySelector('[data-staking-input-deposit]');
        var amount = input ? input.value : '';

        if (!amount || parseFloat(amount) <= 0) {
            setHint('Please enter a valid amount');
            return;
        }

        var submitBtn = document.querySelector('.stake-submit-deposit');
        if (submitBtn) {
            submitBtn.textContent = 'Depositing...';
            submitBtn.disabled = true;
        }

        try {
            var result = await StakingApp.deposit(amount, 0);
            showToast(result.success, result.success ? 'Deposit Success' : 'Deposit Failed', result.message, result.hash);
            if (result.success) {
                input.value = '';
                await loadStakingData();
            }
        } catch (err) {
            console.error('Deposit error:', err);
            showToast(false, 'Deposit Failed', 'Transaction failed');
        } finally {
            if (submitBtn) {
                submitBtn.textContent = 'Deposit';
                submitBtn.disabled = false;
            }
        }
    }

    async function handleWithdraw() {
        var input = document.querySelector('[data-staking-input-withdraw]');
        var amount = input ? input.value : '';

        if (!amount || parseFloat(amount) <= 0) {
            setHint('Please enter a valid amount');
            return;
        }

        var submitBtn = document.querySelector('.stake-submit-withdraw');
        if (submitBtn) {
            submitBtn.textContent = 'Withdrawing...';
            submitBtn.disabled = true;
        }

        try {
            var result = await StakingApp.withdraw(amount, 0);
            showToast(result.success, result.success ? 'Withdraw Success' : 'Withdraw Failed', result.message, result.hash);
            if (result.success) {
                input.value = '';
                await loadStakingData();
            }
        } catch (err) {
            console.error('Withdraw error:', err);
            showToast(false, 'Withdraw Failed', 'Transaction failed');
        } finally {
            if (submitBtn) {
                submitBtn.textContent = 'Withdraw';
                submitBtn.disabled = false;
            }
        }
    }

    async function handleClaimWithdrawal() {
        var submitBtn = document.getElementById('claim-withdrawal-btn');
        if (submitBtn) {
            submitBtn.textContent = 'Claiming...';
            submitBtn.disabled = true;
        }

        try {
            var result = await StakingApp.claimWithdrawal();
            showToast(result.success, result.success ? 'Claim Success' : 'Claim Failed', result.message, result.hash);
            if (result.success) {
                await loadStakingData();
            }
        } catch (err) {
            console.error('Claim withdrawal error:', err);
            showToast(false, 'Claim Failed', 'Transaction failed');
        } finally {
            if (submitBtn) {
                submitBtn.textContent = 'Claim Withdrawal';
                submitBtn.disabled = false;
            }
        }
    }

    async function updateWithdrawalStatus() {
        try {
            var requests = await StakingApp.getWithdrawalRequests(0);
            var containerEl = document.getElementById('withdrawal-requests');
            var listEl = document.getElementById('withdrawal-requests-list');
            if (!containerEl || !listEl) return;

            if (requests.length > 0) {
                containerEl.style.display = 'block';
                listEl.innerHTML = '';

                var now = Math.floor(Date.now() / 1000);

                requests.forEach(function(req, index) {
                    var remaining = Number(req.claimableAt) - now;
                    var amountStr = (Number(req.amount) / 1e18).toFixed(4);
                    var timeStr = new Date(Number(req.requestTime) * 1000).toLocaleString();

                    var item = document.createElement('div');
                    item.className = 'withdrawal-request-item';

                    var infoDiv = document.createElement('div');
                    infoDiv.className = 'withdrawal-request-info';

                    var amountDiv = document.createElement('div');
                    amountDiv.className = 'withdrawal-request-amount';
                    amountDiv.textContent = amountStr + ' Tokens';

                    var timeDiv = document.createElement('div');
                    timeDiv.className = 'withdrawal-request-time';
                    timeDiv.textContent = 'Requested: ' + timeStr;

                    var timerDiv = document.createElement('div');
                    timerDiv.className = 'withdrawal-request-timer';

                    var claimBtn = document.createElement('button');
                    claimBtn.className = 'withdrawal-claim-btn';
                    claimBtn.textContent = 'Claim';
                    claimBtn.dataset.index = String(index);

                    if (remaining > 0) {
                        var timeRemaining = StakingApp.formatTimeRemaining ? StakingApp.formatTimeRemaining(BigInt(remaining)) : formatRemainingTime(remaining);
                        timerDiv.textContent = 'Available in: ' + timeRemaining;
                        timerDiv.classList.add('ready');
                        claimBtn.disabled = true;
                    } else {
                        timerDiv.textContent = 'Ready to claim!';
                        timerDiv.classList.add('ready');
                        claimBtn.disabled = false;
                        claimBtn.addEventListener('click', handleClaimWithdrawalByIndex);
                    }

                    infoDiv.appendChild(amountDiv);
                    infoDiv.appendChild(timeDiv);
                    infoDiv.appendChild(timerDiv);
                    item.appendChild(infoDiv);
                    item.appendChild(claimBtn);
                    listEl.appendChild(item);
                });
            } else {
                containerEl.style.display = 'none';
            }
        } catch (err) {
            console.error('Error updating withdrawal status:', err);
        }
    }

    async function handleClaimWithdrawalByIndex(e) {
        var btn = e.target;
        var index = parseInt(btn.dataset.index || '0');
        btn.textContent = 'Claiming...';
        btn.disabled = true;

        try {
            var result = await StakingApp.claimWithdrawal();
            showToast(result.success, result.success ? 'Claim Success' : 'Claim Failed', result.message, result.hash);
            if (result.success) {
                await loadStakingData();
                await updateWithdrawalStatus();
            }
        } catch (err) {
            console.error('Claim withdrawal error:', err);
            showToast(false, 'Claim Failed', 'Transaction failed');
            btn.textContent = 'Claim';
            btn.disabled = false;
        }
    }

    function formatRemainingTime(seconds) {
        var secs = seconds;
        if (secs <= 0) return 'Ready';
        var days = Math.floor(secs / 86400);
        var hours = Math.floor((secs % 86400) / 3600);
        var minutes = Math.floor((secs % 3600) / 60);
        if (days > 0) return days + 'd ' + hours + 'h';
        if (hours > 0) return hours + 'h ' + minutes + 'm';
        return minutes + 'm';
    }

    function startWithdrawalStatusUpdate() {
        if (withdrawInterval) clearInterval(withdrawInterval);
        updateWithdrawalStatus();
        withdrawInterval = setInterval(updateWithdrawalStatus, 10000);
    }

    window.StakingApp = StakingApp;
    init();
})();
</script>

<script src="js/i18n.js" type="text/javascript"></script>
